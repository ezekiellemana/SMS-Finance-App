[versions]
agp = "8.5.2"
kotlin = "2.0.0"
coreKtx = "1.13.1"
junit = "4.13.2"
junitVersion = "1.2.1"
espressoCore = "3.6.1"
lifecycleRuntimeKtx = "2.8.6"
activityCompose = "1.9.2"
composeBom = "2024.09.03"
room = "2.6.1"
hilt = "2.52"
hiltNavigation = "1.2.0"
securityCrypto = "1.1.0-alpha06"
biometric = "1.2.0-alpha05"
glance = "1.1.0"
vico = "2.0.0-alpha.28"
navigation = "2.8.1"
